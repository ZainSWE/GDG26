<!doctype html>
<html lang="en">
<head>
	<meta charset="UTF-8" />
	<meta name="viewport" content="width=device-width, initial-scale=1.0" />
	<title>Memory Palace - Local Test</title>
	<style>
		body {
			font-family: sans-serif;
			margin: 40px;
			max-width: 720px;
		}

		textarea {
			width: 100%;
			min-height: 120px;
			margin-bottom: 12px;
			padding: 10px;
		}

		button {
			padding: 10px 16px;
			cursor: pointer;
		}

		pre {
			margin-top: 16px;
			padding: 12px;
			background: #f5f5f5;
			border: 1px solid #ddd;
			white-space: pre-wrap;
			word-break: break-word;
		}
	</style>
</head>
<body>
	<h1>Memory Palace (Placeholder)</h1>
	<p>Type notes and test connection to local backend.</p>

	<textarea id="notes" placeholder="Write notes here..."></textarea>
	<br />
	<button id="sendBtn" type="button">Send To Backend</button>

	<pre id="result">Waiting for request...</pre>

	<script>
		const backendUrl = "http://localhost:4000/generate";
		const sendBtn = document.getElementById("sendBtn");
		const notesEl = document.getElementById("notes");
		const resultEl = document.getElementById("result");

		sendBtn.addEventListener("click", async () => {
			const notes = notesEl.value.trim();

			if (!notes) {
				resultEl.textContent = "Please enter some notes first.";
				return;
			}

			resultEl.textContent = "Sending request...";

			try {
				const response = await fetch(backendUrl, {
					method: "POST",
					headers: {
						"Content-Type": "application/json",
					},
					body: JSON.stringify({ notes }),
				});

				const data = await response.json();
				resultEl.textContent = JSON.stringify(data, null, 2);
			} catch (error) {
				resultEl.textContent = `Request failed: ${error.message}`;
			}
		});
	</script>
</body>
</html>
