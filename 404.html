<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Mind Mesh</title>
    <script>
      // GitHub Pages SPA routing: save the path and redirect to root
      var base = '/GDG26';
      var path = location.pathname.slice(base.length) || '/';
      if (location.search) path += location.search;
      if (location.hash) path += location.hash;
      sessionStorage.setItem('spa-redirect', path);
      location.replace(base + '/');
    </script>
  </head>
</html>
